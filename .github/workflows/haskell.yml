name: Haskell CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.4.7"
          cabal-version: "3.8"
      - name: Cache cabal
        uses: actions/cache@v3
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('haskell-chess.cabal') }}
          restore-keys: ${{ runner.os }}-cabal-
      - run: cabal update
      - name: Build all declared components
        run: |
          cabal build \
            lib:haskell-chess \
            exe:haskell-chess \
            exe:tiny-main2 \
            exe:create-tiny \
            exe:convert-nnue \
            exe:bench-magic \
            test:haskell-chess-test \
            exe:bench-search \
            exe:bench-core \
            exe:bench-elo \
            exe:bench-tactics \
            exe:bench-report \
            exe:bench-san \
            exe:micro-bench \
            exe:bench-eval \
            exe:bench-evasions \
            exe:bench-pseudo-legal-moves \
            --ghc-options="-O0 +RTS -M4G -RTS"
      - run: cabal test haskell-chess-test --ghc-options="-O0 +RTS -M4G -RTS"
