name: Haskell CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: haskell:9.4.4  # offizielles Docker-Image mit GHC 9.4.4 + Cabal
    steps:
      - uses: actions/checkout@v3

      - name: Cache cabal store and build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: ${{ runner.os }}-cabal-

      - name: Update cabal package list
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all
